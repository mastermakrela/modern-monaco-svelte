name: Deploy demo to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow GITHUB_TOKEN to deploy to Pages and one concurrent deployment.
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2

      # The demo resolves `modern-monaco-svelte` to the library source via a
      # SvelteKit alias (see demo/svelte.config.js) — no `file:..` dependency,
      # no library build step. But those aliased files still belong to the
      # library's own SvelteKit project, so its `.svelte-kit/tsconfig.json`
      # must exist too (generated by the library's `prepare` script below) or
      # vite-plugin-svelte fails to find a tsconfig for them.
      - name: Install library dependencies
        run: bun install --frozen-lockfile

      - name: Install demo dependencies
        working-directory: demo
        run: bun install --frozen-lockfile

      - name: Build demo
        working-directory: demo
        # served from https://<user>.github.io/modern-monaco-svelte/
        env:
          BASE_PATH: /modern-monaco-svelte
        run: bun run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: demo/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
