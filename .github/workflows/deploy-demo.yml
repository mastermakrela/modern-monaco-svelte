name: Deploy demo to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow GITHUB_TOKEN to deploy to Pages and one concurrent deployment.
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2

      - name: Install library dependencies
        run: bun install --frozen-lockfile

      # The demo depends on the library via `file:..`, which resolves to the
      # built `dist/` — package the library before installing the demo.
      - name: Build library
        run: bun run prepack

      - name: Install demo dependencies
        working-directory: demo
        run: bun install

      - name: Build demo
        working-directory: demo
        # served from https://<user>.github.io/modern-monaco-svelte/
        env:
          BASE_PATH: /modern-monaco-svelte
        run: bun run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: demo/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
