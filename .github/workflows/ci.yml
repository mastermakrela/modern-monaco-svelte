name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Type check
        run: bun run check

      - name: Unit tests
        run: bun run test:unit

      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps chromium

      # browser tests load editor modules, grammars, and themes from esm.sh
      - name: Browser tests
        run: bun run test:browser

      - name: Package (svelte-package + publint)
        run: bun run prepack
