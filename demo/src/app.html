			content="Live demo of modern-monaco-svelte: Svelte 5 components for modern-monaco with Monaco and markdown editors, Shiki highlighting, multi-file workspaces, lazy loading, and SSR."

		<meta property="og:title" content="modern-monaco-svelte" />

			content="Svelte 5 components for modern-monaco: Monaco and markdown editors with Shiki highlighting, workspaces, lazy loading, and SSR."

			title="llms.txt (LLM-friendly docs)"
